<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nuffypips</title>
<link rel="icon" type="image/jpeg" href="/logo.jpg">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #A9D9E4;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    animation: settle .6s ease-out;
  }
  @keyframes settle { from { opacity: 0; } to { opacity: 1; } }
  .logo {
    width: min(86vw, 760px);
    height: auto;
    display: block;
  }
  .game-link {
    color: #2d4d80;
    font-size: clamp(15px, 2.4vw, 19px);
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 2px solid transparent;
    padding-bottom: 2px;
    transition: color .15s, border-color .15s;
  }
  .game-link:hover {
    color: #8a7a2b;
    border-bottom-color: #8a7a2b;
  }
</style>
</head>
<body>
  <img class="logo" src="/logo.jpg" alt="nuffypips">
  <a class="game-link" href="/chasethecup">play chase the cup &rarr;</a>
</body>
</html>
